<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — TaskFlow</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-body">

  <div class="auth-wrapper">
    <!-- LEFT PANEL -->
    <div class="auth-left">
      <div class="auth-logo">
        <i class="ph ph-kanban"></i>
        Task<span>Flow</span>
      </div>
      <div class="auth-left-content">
        <h1>Start managing<br/>your projects</h1>
        <p>Join thousands of teams using TaskFlow to ship better products faster.</p>
        <div class="auth-features">
          <div class="auth-feature">
            <i class="ph ph-check-circle"></i>
            <span>Free to get started</span>
          </div>
          <div class="auth-feature">
            <i class="ph ph-check-circle"></i>
            <span>Invite unlimited members</span>
          </div>
          <div class="auth-feature">
            <i class="ph ph-check-circle"></i>
            <span>Real time updates</span>
          </div>
        </div>
      </div>
      <div class="auth-blob"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
      <div class="auth-form-wrapper">
        <h2>Create account</h2>
        <p class="auth-sub">Join TaskFlow for free today</p>

        <div class="alert" id="alertBox"></div>

        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrapper">
            <i class="ph ph-user"></i>
            <input type="text" id="name" placeholder="Enter your full name"/>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="ph ph-envelope"></i>
            <input type="email" id="email" placeholder="Enter your email"/>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="ph ph-lock"></i>
            <input type="password" id="password" placeholder="Create a password"/>
            <i class="ph ph-eye" id="togglePassword" style="cursor:pointer"></i>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <i class="ph ph-lock"></i>
            <input type="password" id="confirmPassword" placeholder="Repeat your password"/>
          </div>
        </div>

        <button class="btn-auth" id="signupBtn" onclick="registerUser()">
          <span>Create Account</span>
          <i class="ph ph-arrow-right"></i>
        </button>

        <p class="auth-switch">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/signup.js"></script>
</body>
</html>
